name: CI/CD - ECS Blue/Green
 
on:
  push:
    branches: [master]
  workflow_dispatch:
 
permissions:
  id-token: write      # required for OIDC
  contents: read
 
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: helloworld
  ECS_CLUSTER: test-ecs
  ECS_SERVICE: hw-service
  TASK_FAMILY: hw-service
 
jobs:
  # ===========================================================================
  # 1. Build, scan, push image
  # ===========================================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::504110891886:role/github-oidc-provider-aws
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Compute image tag
        id: image
        run: |
          REPO="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}"
          echo "uri=${REPO}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest=${REPO}:latest" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t "${{ steps.image.outputs.uri }}" -t "${{ steps.image.outputs.latest }}" .

      - name: Push image
        run: |
          docker push "${{ steps.image.outputs.uri }}"
          docker push "${{ steps.image.outputs.latest }}"
  deploy:
    name: Deploy (Blue/Green)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::504110891886:role/github-oidc-provider-aws
          aws-region: ${{ env.AWS_REGION }}
 
      # Render the new image into the existing task definition.
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' \
            --output json > task-definition.json
 
      - name: Render task definition
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: "hw-container"
          image: ${{ needs.build.outputs.image }}
 
      # The service must already be configured with deploymentController
      # type ECS and a BlueGreen strategy (you own the infra, so this is set).
      # This action registers the new task def and triggers the blue/green
      # rollout, then polls until the deployment reaches a terminal state.
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
 